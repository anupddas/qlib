name: Test Jupyter Notebook (workflow_by_code)

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches: [main]
    paths:
      - "examples/workflow_by_code.ipynb"
      - "qlib/**"
      - ".github/workflows/test_notebook.yml"
      - "Makefile"
  pull_request:
    branches: [main]
    paths:
      - "examples/workflow_by_code.ipynb"
      - "qlib/**"
      - ".github/workflows/test_notebook.yml"
      - "Makefile"
  workflow_dispatch:

jobs:
  test-notebook:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    strategy:
      matrix:
        python-version: ["3.8", "3.9"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install PyTorch (CPU)
        run: |
          python -m pip install torch torchvision torchaudio \
            --extra-index-url https://download.pytorch.org/whl/cpu

      - name: Install qlib and notebook dependencies
        run: |
          make dev
          python -m pip install numba
          python -m pip install "nbmake>=1.3.5" ipykernel
          python -m ipykernel install --user --name python3

      - name: Download qlib test data
        run: |
          python scripts/get_data.py qlib_data \
            --name qlib_data_simple \
            --target_dir ~/.qlib/qlib_data/cn_data \
            --interval 1d --region cn

      - name: Execute workflow_by_code.ipynb
        run: |
          pytest --nbmake \
                 --nbmake-timeout=3600 \
                 examples/workflow_by_code.ipynb \
                 -v

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: executed-notebook-py${{ matrix.python-version }}
          path: examples/workflow_by_code.ipynb
          retention-days: 7
